syntax = "proto3";

package velora.auth.v1;

service AuthService {
    rpc Register(RegisterRequest) returns (AuthTokens);
    rpc Login(LoginRequest) returns (AuthTokens);
    rpc RefreshSession(RefreshSessionRequest) returns (AuthTokens);
    rpc Logout(LogoutRequest) returns (AuthTokens);
}

message RegisterRequest {
    string email = 1;
    string password = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message RefreshSessionRequest {
    string refresh_token = 1;
}

message LogoutRequest {
    string refresh_token = 1;
}

message LogoutResponse {}

message AuthTokens {
    string access_token = 1;    // PASETO v4, short duration (~15 min)
    string refresh_token = 2;   // opaque, long-lasting, server-side cached
    int64 expires_in = 3;        // Access token lifetime, in seconds
}