name: velora

services:
  # --- Bases de données ----------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Cache, pub/sub, refresh tokens -------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Bus d'événements --------------------------------------
  nats:
    image: nats:2.10-alpine
    command: [ "--jetstream", "--store_dir", "/data" ]
    ports:
      - "${NATS_CLIENT_PORT}:4222"
      - "${NATS_MONITOR_PORT}:8222" # UI de monitoring HTTP
    volumes:
      - nats_data:/data

  # --- Stockage objet S3-compatible (vidéos, affiches) -----
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001" # console web d'administration
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # Crée les buckets au démarrage puis s'arrête
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; mc mb --ignore-existing local/velora-videos; mc mb --ignore-existing local/velora-images; exit 0; "

  # --- Recherche du catalogue --------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    ports:
      - "${MEILI_PORT}:7700"
    volumes:
      - meili_data:/meili_data

  # --- UI Redis (navigator : http://localhost:5540) -----------
  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

  # --- Traces distribuées ----------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "${JAEGER_UI_PORT}:16686" # interface web des traces
      - "${OTLP_GRPC_PORT}:4317" # réception OTLP depuis nos services

  # --- Devcontainer VS Code --------------------------------
  workspace:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sleep infinity
    volumes:
      - .:/app:cached
      - cargo_registry:/usr/local/cargo/registry
      - target_cache:/app/target
    environment:
      DATABASE_URL_AUTH: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/velora_auth
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      RUST_LOG: info,sqlx=warn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Microservices ------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      SERVICE: gateway
      HTTP_PORT: "8080"
      AUTH_GRPC_URL: http://auth:50051
      PASETO_PUBLIC_KEY: ${PASETO_PUBLIC_KEY} # PUBLIC KEY ONLY
      RUST_LOG: info,tower_http=debug
    ports:
      - "8080:8080"
    volumes:
      - .:/app:cached
      - cargo_registry:/usr/local/cargo/registry
      - target_cache:/app/target
    depends_on:
      - auth
  auth:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      SERVICE: auth
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/velora_auth
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      PASETO_SECRET_KEY: ${PASETO_SECRET_KEY}
      GRPC_PORT: "50051"
      RUST_LOG: info
    ports:
      - "50051:50051"
    volumes:
      - .:/app:cached
      - cargo_registry:/usr/local/cargo/registry
      - target_cache:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  meili_data:
  cargo_registry:
  target_cache:
