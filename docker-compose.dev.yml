name: velora

services:
  # --- Bases de données ----------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Cache, pub/sub, refresh tokens -------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Bus d'événements --------------------------------------
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "${NATS_CLIENT_PORT}:4222"
      - "${NATS_MONITOR_PORT}:8222"   # UI de monitoring HTTP
    volumes:
      - nats_data:/data

  # ── Stockage objet S3-compatible (vidéos, affiches) ─
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"  # console web d'administration
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Crée les buckets au démarrage puis s'arrête
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/velora-videos;
      mc mb --ignore-existing local/velora-images;
      exit 0;
      "

  # --- Recherche du catalogue --------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    ports:
      - "${MEILI_PORT}:7700"
    volumes:
      - meili_data:/meili_data

  # --- Traces distribuées ----------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "${JAEGER_UI_PORT}:16686"   # interface web des traces
      - "${OTLP_GRPC_PORT}:4317"    # réception OTLP depuis nos services

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  meili_data: